<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vevoga – Brandmark Intro Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06070b;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
  }

  /* ─── GRID BG ─────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 72px 72px;
    opacity: 0.06;
    pointer-events: none;
  }

  /* ─── CONTROLS ─────────────────────────────────────────────── */
  .controls {
    position: fixed;
    top: 28px;
    display: flex;
    gap: 10px;
    z-index: 100;
  }

  .btn {
    padding: 9px 18px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .btn:hover { background: rgba(255,255,255,0.12); color: white; }
  .btn.active { border-color: rgba(99,102,241,0.6); background: rgba(99,102,241,0.18); color: white; }

  /* ─── SCENE ────────────────────────────────────────────────── */
  .scene {
    perspective: 800px;
    perspective-origin: 50% 50%;
  }

  /* ─── BRANDMARK BASE ───────────────────────────────────────── */
  .brand {
    position: relative;
    width: 80px;
    height: 80px;
    transform-style: preserve-3d;
  }

  .brand-glow-outer {
    position: absolute;
    inset: -24px;
    border-radius: 34px;
    background: radial-gradient(circle, rgba(99,102,241,0.55), transparent 70%);
    filter: blur(18px);
  }

  .brand-glow-inner {
    position: absolute;
    inset: -8px;
    border-radius: 26px;
    background: radial-gradient(circle, rgba(139,92,246,0.5), transparent 75%);
    filter: blur(12px);
  }

  .brand-face {
    position: absolute;
    inset: 0;
    border-radius: 22px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 55%, #34d399 100%);
    box-shadow: 0 0 40px rgba(99,102,241,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 14px rgba(255,255,255,0.4);
    backface-visibility: hidden;
  }

  /* ─── VARIANT A: WARP-IN ───────────────────────────────────── */
  .variant-a .brand {
    animation: warpIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .variant-a .brand-glow-outer {
    animation: glowFadeIn 1.4s ease forwards 0.3s;
    opacity: 0;
  }
  .variant-a .brand-glow-inner {
    animation: glowFadeIn 1.4s ease forwards 0.2s;
    opacity: 0;
  }

  @keyframes warpIn {
    0%   { transform: rotateY(-180deg) scale(0.05) translateZ(-600px); opacity: 0; }
    40%  { opacity: 1; }
    70%  { transform: rotateY(12deg) scale(1.08) translateZ(0); }
    85%  { transform: rotateY(-5deg) scale(0.97) translateZ(0); }
    100% { transform: rotateY(0deg) scale(1) translateZ(0); }
  }

  /* ─── VARIANT B: SHATTER/ASSEMBLE ─────────────────────────── */
  .variant-b .brand {
    animation: none;
  }
  .variant-b .brand-face {
    animation: assembleFace 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .variant-b .brand-glow-outer {
    animation: glowFadeIn 1s ease forwards 0.5s;
    opacity: 0;
  }
  .variant-b .brand-glow-inner {
    animation: glowFadeIn 1s ease forwards 0.4s;
    opacity: 0;
  }

  @keyframes assembleFace {
    0%   { transform: scale(0) rotateX(90deg) rotateZ(45deg); opacity: 0; clip-path: polygon(50% 50%, 50% 50%, 50% 50%); }
    30%  { opacity: 1; clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
    60%  { transform: scale(1.12) rotateX(-6deg) rotateZ(0deg); clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
    80%  { transform: scale(0.96) rotateX(3deg); }
    100% { transform: scale(1) rotateX(0deg) rotateZ(0deg); opacity: 1; clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
  }

  /* ─── VARIANT C: RISE FROM VOID ────────────────────────────── */
  .variant-c .brand {
    animation: riseIn 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .variant-c .brand-glow-outer {
    animation: glowPulseIn 1.6s ease forwards;
    opacity: 0;
  }
  .variant-c .brand-glow-inner {
    animation: glowPulseIn 1.6s ease forwards 0.15s;
    opacity: 0;
  }

  @keyframes riseIn {
    0%   { transform: translateZ(-1200px) translateY(60px) rotateX(25deg); opacity: 0; }
    20%  { opacity: 1; }
    65%  { transform: translateZ(30px) translateY(-8px) rotateX(-4deg); }
    80%  { transform: translateZ(-8px) translateY(3px) rotateX(2deg); }
    100% { transform: translateZ(0) translateY(0) rotateX(0deg); opacity: 1; }
  }

  @keyframes glowFadeIn {
    0%   { opacity: 0; transform: scale(0.4); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes glowPulseIn {
    0%   { opacity: 0; transform: scale(2); }
    40%  { opacity: 0.7; }
    100% { opacity: 1; transform: scale(1); }
  }

  /* ─── SHARED FLOAT AFTER INTRO ─────────────────────────────── */
  .brand-face {
    animation-fill-mode: forwards;
  }

  /* ─── LABEL ─────────────────────────────────────────────────── */
  .label {
    margin-top: 48px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.28em;
    color: rgba(255,255,255,0.3);
    text-align: center;
    opacity: 0;
    animation: labelIn 0.6s ease forwards 1.2s;
  }

  @keyframes labelIn {
    to { opacity: 1; }
  }

  /* ─── REPLAY HINT ───────────────────────────────────────────── */
  .hint {
    position: fixed;
    bottom: 28px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<div class="controls">
  <button class="btn active" onclick="setVariant('a')">A — Warp In</button>
  <button class="btn" onclick="setVariant('b')">B — Assemble</button>
  <button class="btn" onclick="setVariant('c')">C — Rise</button>
</div>

<div class="scene" id="scene">
  <div class="brand" id="brand">
    <div class="brand-glow-outer"></div>
    <div class="brand-glow-inner"></div>
    <div class="brand-face">V</div>
  </div>
</div>

<div class="label">VEVOGA SYSTEMS</div>
<div class="hint">Auf Variante klicken zum Vergleichen · Klick auf V zum Wiederholen</div>

<script>
  let current = 'a';

  function setVariant(v) {
    current = v;
    document.querySelectorAll('.btn').forEach((b, i) => {
      b.classList.toggle('active', ['a','b','c'][i] === v);
    });
    replay();
  }

  function replay() {
    const scene = document.getElementById('scene');
    // Remove old, re-insert to restart animations
    const clone = scene.firstElementChild.cloneNode(true);
    scene.replaceChild(clone, scene.firstElementChild);
    scene.firstElementChild.className = `brand variant-${current}`;
    scene.firstElementChild.addEventListener('click', replay);
  }

  document.getElementById('brand').addEventListener('click', replay);
  document.getElementById('brand').className = 'brand variant-a';
</script>
</body>
</html>
