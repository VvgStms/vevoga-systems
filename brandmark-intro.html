<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vevoga – Intro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── SIMULATED PAGE (behind overlay) ─────────────── */
  #page {
    position: fixed;
    inset: 0;
    background: #06070b;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
    overflow: hidden;
  }

  #page::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 72px 72px;
    opacity: 0.06;
  }

  .page-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    background: rgba(6,7,11,0.6);
    z-index: 1;
  }

  .page-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.28em;
    color: white;
  }

  .page-logo-mark {
    position: relative;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .page-logo-mark .lm-glow-a {
    position: absolute;
    inset: -10px;
    border-radius: 22px;
    background: radial-gradient(circle, rgba(99,102,241,0.55), transparent 70%);
    filter: blur(14px);
    opacity: 0.85;
  }

  .page-logo-mark .lm-glow-b {
    position: absolute;
    inset: -4px;
    border-radius: 18px;
    background: radial-gradient(circle, rgba(139,92,246,0.5), transparent 75%);
    filter: blur(10px);
    opacity: 0.85;
  }

  .page-logo-mark .lm-face {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 55%, #34d399 100%);
    box-shadow: 0 0 30px rgba(99,102,241,0.45);
  }

  .page-logo-mark .lm-v {
    position: relative;
    z-index: 1;
    font-size: 18px;
    font-weight: 800;
    color: white;
    text-shadow: 0 0 10px rgba(255,255,255,0.35);
    line-height: 1;
  }

  .page-nav {
    display: flex;
    gap: 32px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }

  .page-hero {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
    gap: 24px;
  }

  .page-eyebrow {
    padding: 7px 18px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  .page-h1 {
    font-size: clamp(28px, 4vw, 56px);
    font-weight: 600;
    line-height: 1.08;
    letter-spacing: -0.02em;
    max-width: 720px;
    background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.55) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .page-sub {
    font-size: 17px;
    color: rgba(255,255,255,0.5);
    max-width: 520px;
    line-height: 1.7;
  }

  /* ─── FLASH LAYER ──────────────────────────────────── */
  #flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 200;
  }

  /* ─── INTRO OVERLAY ────────────────────────────────── */
  #overlay {
    position: fixed;
    inset: 0;
    background: #06070b;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    user-select: none;
  }

  #overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 72px 72px;
    opacity: 0.06;
    pointer-events: none;
  }

  .ambient {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle at 50% 50%, rgba(99,102,241,0.1) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .ambient.on { opacity: 1; }

  /* ─── LAYOUT ───────────────────────────────────────── */
  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    perspective: 800px;
  }

  /* ─── WORD STAGE ───────────────────────────────────── */
  .word-stage {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
    position: relative;
    min-width: 320px;
  }

  .word {
    position: absolute;
    font-size: clamp(22px, 3.5vw, 30px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: white;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
  }

  .word.ignite {
    animation: starBurst 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes starBurst {
    0%   { opacity: 0; transform: scale(0.82) translateY(4px); filter: blur(6px);
           text-shadow: 0 0 0px rgba(255,255,255,0); }
    18%  { opacity: 1; transform: scale(1.04) translateY(0); filter: blur(0);
           text-shadow: 0 0 18px rgba(255,255,255,1), 0 0 40px rgba(200,180,255,0.8), 0 0 80px rgba(139,92,246,0.5); }
    45%  { opacity: 0.95; transform: scale(1) translateY(0);
           text-shadow: 0 0 10px rgba(255,255,255,0.6), 0 0 28px rgba(139,92,246,0.3); }
    100% { opacity: 0; transform: scale(1.08) translateY(-3px); filter: blur(3px);
           text-shadow: 0 0 0px rgba(255,255,255,0); }
  }

  .word.stay {
    animation: starIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes starIn {
    0%   { opacity: 0; transform: scale(0.82) translateY(4px); filter: blur(6px); }
    22%  { opacity: 1; transform: scale(1.05) translateY(0); filter: blur(0);
           text-shadow: 0 0 20px rgba(255,255,255,1), 0 0 50px rgba(200,180,255,0.8); }
    100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0);
           text-shadow: 0 0 6px rgba(255,255,255,0.15); }
  }

  /* fade-out word stage when exiting */
  .word-stage.exit-fade { animation: quickFade 0.3s ease forwards; }
  @keyframes quickFade { to { opacity: 0; } }

  /* ─── BRANDMARK ────────────────────────────────────── */
  .scene {
    transform-style: preserve-3d;
    animation: floatBob 3.2s ease-in-out infinite;
    animation-play-state: paused;
  }
  .scene.floating { animation-play-state: running; }

  /* EXIT: V flies at the viewer */
  .scene.fly-at {
    animation: flyAt 1.1s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
  }

  @keyframes flyAt {
    0%   { transform: scale(1) rotateY(0deg) rotateZ(0deg) translateZ(0); }
    40%  { transform: scale(3.5) rotateY(140deg) rotateZ(-12deg) translateZ(80px); }
    75%  { transform: scale(12) rotateY(260deg) rotateZ(-22deg) translateZ(0); opacity: 1; }
    100% { transform: scale(22) rotateY(360deg) rotateZ(-28deg) translateZ(-40px); opacity: 0; }
  }

  @keyframes floatBob {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
  }

  .brand {
    position: relative;
    width: 80px;
    height: 80px;
    transform-style: preserve-3d;
    animation: riseIn 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes riseIn {
    0%   { transform: translateZ(-1200px) translateY(60px) rotateX(25deg); opacity: 0; }
    20%  { opacity: 1; }
    65%  { transform: translateZ(30px) translateY(-8px) rotateX(-4deg); }
    80%  { transform: translateZ(-8px) translateY(3px) rotateX(2deg); }
    100% { transform: translateZ(0) translateY(0) rotateX(0deg); opacity: 1; }
  }

  .glow-outer {
    position: absolute;
    inset: -28px;
    border-radius: 36px;
    background: radial-gradient(circle, rgba(99,102,241,0.55), transparent 70%);
    filter: blur(20px);
    opacity: 0;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .glow-inner {
    position: absolute;
    inset: -10px;
    border-radius: 28px;
    background: radial-gradient(circle, rgba(139,92,246,0.6), transparent 75%);
    filter: blur(13px);
    opacity: 0;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }

  .glow-outer.pulse { animation: outerPulse 0.7s ease forwards; }
  .glow-inner.pulse { animation: innerPulse 0.65s ease forwards; }

  @keyframes outerPulse {
    0%   { opacity: 0.3; transform: scale(0.85); }
    30%  { opacity: 1;   transform: scale(1.45); }
    100% { opacity: 0.85; transform: scale(1); }
  }
  @keyframes innerPulse {
    0%   { opacity: 0.3; transform: scale(0.85); }
    30%  { opacity: 1;   transform: scale(1.3); }
    100% { opacity: 0.9; transform: scale(1); }
  }

  /* glow explodes on exit */
  .glow-outer.explode { animation: glowExplode 1s ease forwards !important; }
  .glow-inner.explode { animation: glowExplode 0.9s ease forwards !important; }

  @keyframes glowExplode {
    0%   { opacity: 0.85; transform: scale(1); }
    50%  { opacity: 1; transform: scale(5); }
    100% { opacity: 0; transform: scale(18); }
  }

  .brand-face {
    position: absolute;
    inset: 0;
    border-radius: 22px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 55%, #34d399 100%);
    box-shadow: 0 0 40px rgba(99,102,241,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 14px rgba(255,255,255,0.4);
    transition: box-shadow 0.15s ease;
  }
  .brand-face.lit {
    box-shadow: 0 0 70px rgba(99,102,241,0.9), 0 0 20px rgba(139,92,246,0.7);
  }

  /* ─── COMPANY NAME ─────────────────────────────────── */
  .company-name {
    margin-top: 28px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .company-name.visible { opacity: 1; }
  .company-name.exit-fade { animation: quickFade 0.3s ease forwards; }

  /* ─── OVERLAY EXIT ─────────────────────────────────── */
  #overlay.fade-out {
    animation: overlayOut 0.5s ease forwards;
  }
  @keyframes overlayOut {
    0%   { opacity: 1; }
    100% { opacity: 0; pointer-events: none; }
  }
</style>
</head>
<body>

<!-- Simulated page behind the overlay -->
<div id="page">
  <div class="page-header">
    <div class="page-logo">
      <div class="page-logo-mark">
        <div class="lm-glow-a"></div>
        <div class="lm-glow-b"></div>
        <div class="lm-face"></div>
        <span class="lm-v">V</span>
      </div>
      VEVOGA SYSTEMS
    </div>
    <nav class="page-nav">
      <span>Retail</span>
      <span>Knowledge</span>
      <span>Pilot</span>
      <span>Kontakt</span>
    </nav>
  </div>
  <div class="page-hero">
    <div class="page-eyebrow">Vevoga Systems</div>
    <h1 class="page-h1">Was Ihr Kunde nicht findet, kauft er woanders.</h1>
    <p class="page-sub">Zwei stille Kostentreiber. Beide lösbar — ohne App, ohne IT-Projekt, ohne großen Aufwand.</p>
  </div>
</div>

<!-- White flash -->
<div id="flash"></div>

<!-- Intro overlay -->
<div id="overlay">
  <div class="ambient" id="ambient"></div>

  <div class="wrapper">
    <div class="word-stage" id="wordStage">
      <div class="word" id="wordEl"></div>
    </div>

    <div class="scene" id="scene">
      <div class="brand" id="brand">
        <div class="glow-outer" id="glowOuter"></div>
        <div class="glow-inner" id="glowInner"></div>
        <div class="brand-face" id="brandFace">V</div>
      </div>
    </div>

    <div class="company-name" id="companyName">Vevoga Systems</div>
  </div>
</div>

<script>
  const words    = ['Innovation', 'Effizienz', 'Entlastung', 'Struktur'];
  const WORD_DUR = 950;
  const GAP      = 80;
  let running    = false;

  function pulse() {
    const go = document.getElementById('glowOuter');
    const gi = document.getElementById('glowInner');
    const bf = document.getElementById('brandFace');
    go.classList.remove('pulse');
    gi.classList.remove('pulse');
    void go.offsetWidth;
    go.classList.add('pulse');
    gi.classList.add('pulse');
    bf.classList.add('lit');
    setTimeout(() => bf.classList.remove('lit'), 300);
  }

  function showWord(text, stay = false) {
    return new Promise(resolve => {
      const el = document.getElementById('wordEl');
      el.textContent = text;
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';
      el.className = 'word ' + (stay ? 'stay' : 'ignite');
      pulse();
      if (stay) { resolve(); }
      else { setTimeout(resolve, WORD_DUR + GAP); }
    });
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function triggerExit() {
    const scene     = document.getElementById('scene');
    const wordStage = document.getElementById('wordStage');
    const compName  = document.getElementById('companyName');
    const glowOuter = document.getElementById('glowOuter');
    const glowInner = document.getElementById('glowInner');
    const flash     = document.getElementById('flash');
    const overlay   = document.getElementById('overlay');

    // Fade out text elements
    wordStage.classList.add('exit-fade');
    compName.classList.add('exit-fade');

    await delay(120);

    // V flies at viewer + glow explodes
    scene.classList.remove('floating');
    scene.classList.add('fly-at');
    glowOuter.classList.add('explode');
    glowInner.classList.add('explode');

    // Flash at ~50% of fly animation
    await delay(520);
    flash.style.transition = 'opacity 0.18s ease';
    flash.style.opacity    = '1';

    await delay(180);
    flash.style.transition = 'opacity 0.35s ease';
    flash.style.opacity    = '0';

    // Fade out overlay
    overlay.classList.add('fade-out');

    await delay(500);
    overlay.style.display = 'none';
  }

  async function runSequence() {
    if (running) return;
    running = true;

    // Reset
    document.getElementById('ambient').classList.remove('on');
    document.getElementById('companyName').classList.remove('visible');
    document.getElementById('companyName').classList.remove('exit-fade');
    document.getElementById('wordStage').classList.remove('exit-fade');
    document.getElementById('wordEl').className = 'word';
    document.getElementById('wordEl').textContent = '';
    document.getElementById('glowOuter').style.opacity = '0';
    document.getElementById('glowInner').style.opacity = '0';
    document.getElementById('glowOuter').classList.remove('pulse', 'explode');
    document.getElementById('glowInner').classList.remove('pulse', 'explode');
    document.getElementById('scene').classList.remove('floating', 'fly-at');
    document.getElementById('overlay').classList.remove('fade-out');
    document.getElementById('overlay').style.display = '';
    document.getElementById('flash').style.opacity = '0';

    await delay(1650);

    document.getElementById('ambient').classList.add('on');
    document.getElementById('glowOuter').style.opacity = '0.85';
    document.getElementById('glowInner').style.opacity = '0.9';
    pulse();

    await delay(500);

    for (let i = 0; i < words.length; i++) {
      await showWord(words[i], false);
    }

    await delay(120);
    document.getElementById('wordEl').style.opacity = '0';
    document.getElementById('companyName').classList.add('visible');
    pulse();

    await delay(600);
    document.getElementById('scene').classList.add('floating');

    // Auto-trigger exit after 1.8s of floating
    await delay(1800);
    running = false;
    triggerExit();
  }

  // Start on load
  runSequence();

  // Replay: click the page to restart
  document.getElementById('page').addEventListener('click', () => {
    // Rebuild brand node to reset riseIn
    const brand = document.getElementById('brand');
    const clone = brand.cloneNode(true);
    brand.parentNode.replaceChild(clone, brand);
    document.getElementById('wordEl').style.opacity = '';
    runSequence();
  });
</script>
</body>
</html>
